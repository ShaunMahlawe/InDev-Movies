<body data-auth-mode="guest">
<div class="login-page">
  <div class="form">


    <form id="signupForm" class="register-form">
      <h1>Sign Up</h1>
      <input id="create-username" type="text" placeholder="username" autocomplete="username" required/>
      <input id="signUpEmail" type="email" placeholder="email address" autocomplete="email" required/>
      <input id="signUpPass" type="password" placeholder="password" autocomplete="new-password" minlength="8" required/>
      <button name="create-button" type="submit" id="create-button">create</button>
      <p class="message">Already registered? <a href="#">Sign In</a></p>
    </form>
    <form id="loginForm" class="login-form">
      <h1>Log In</h1>
      <input id="signInEmail" type="email" placeholder="email" name="login-email" autocomplete="email" required/>
      <input id="signInPass" type="password" placeholder="password" name="login-password" autocomplete="current-password" required/>
