<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }
        .carousel {
            margin-bottom: 40px;
        }
        .carousel-inner {
            border-radius: 0 0 32px 32px;
            overflow: hidden;
        }
        .hero-header {
            background: #181818;
            border-bottom: 1px solid #232323;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 48px 0 48px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }
        .carousel-fade .carousel-item {
            transition: opacity 0.8s ease-in-out;
        }
        .carousel-item {
            min-height: 440px;
            display: flex;
            align-items: flex-end;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .carousel-caption {
            background: rgba(10,10,10,0.7);
            border-radius: 24px;
            padding: 32px 40px;
            margin-bottom: 48px;
            max-width: 520px;
            z-index: 2;
        }
        .carousel-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .carousel-rating {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .carousel-desc {
            font-size: 1.05rem;
            color: #e0e0e0;
            margin-bottom: 18px;
        }
        .carousel-btn {
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 10px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-right: 12px;
            transition: background 0.2s;
        }
        .carousel-btn:hover {
            background: #125ea2;
        }
        .carousel-indicators.custom-indicators [data-bs-target] {
            background-color: #fff;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 0 4px;
        }
        .carousel-indicators .active {
            background-color: #1976d2;
        }
        .hero-carousel-control {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            border: none;
            color: #fff;
            font-size: 2.2rem;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            z-index: 3;
        }
        .hero-carousel-control.prev { left: 24px; }
        .hero-carousel-control.next { right: 24px; }
        .content-block {
            margin: 0 auto 48px auto;
            max-width: 1400px;
            padding: 0 32px;
        }
        .section-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .chip-row {
            margin-bottom: 18px;
        }
        .chip {
            background: #232323;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 6px 18px;
            margin-right: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip.active, .chip:hover {
            background: #1976d2;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 28px;
            margin-top: 24px;
        }
        .movie-card {
            background: #181818;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            transition: transform 0.18s;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: translateY(-6px) scale(1.03);
        }
        .movie-image img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }
        .movie-info {
            padding: 18px 16px 12px 16px;
        }
        .movie-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .movie-meta {
            color: #bdbdbd;
            font-size: 0.98rem;
            margin-bottom: 10px;
        }
        .movie-actions {
            display: flex;
            gap: 10px;
        }
        .btn-watch, .btn-add-list {
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 6px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-watch:hover, .btn-add-list:hover {
            background: #125ea2;
        }
        .poster-row {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .poster-card {
            background: #181818;
            border-radius: 14px;
            overflow: hidden;
            min-width: 180px;
            max-width: 180px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            cursor: pointer;
        }
        .poster-image {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }
        .poster-info {
            padding: 12px 10px 8px 10px;
        }
        .poster-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .poster-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .score {
            background: #1976d2;
            color: #fff;
            border-radius: 8px;
            padding: 2px 10px;
            font-size: 0.98rem;
            font-weight: 600;
        }
        .movie-empty-state {
            text-align: center;
            color: #bdbdbd;
            margin: 48px 0;
        }
    </style>

                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
                    <script>
                    // --- Dynamic Hero Carousel for Library Page ---
                    document.addEventListener('DOMContentLoaded', function() {
                        const apiKey = window.OMDB_API_KEY || '';
                        fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}`)
                            .then(response => response.json())
                            .then(data => {
                                const carouselInner = document.querySelector('#libraryHeroCarousel .carousel-inner');
                                const indicators = document.querySelector('#libraryHeroCarousel .carousel-indicators');
                                if (!carouselInner || !indicators) return;
                                carouselInner.innerHTML = '';
                                indicators.innerHTML = '';
                                (data.results || []).slice(0, 5).forEach((movie, idx) => {
                                    const active = idx === 0 ? 'active' : '';
                                    const bg = movie.backdrop_path ? `https://image.tmdb.org/t/p/original${movie.backdrop_path}` : '../Asset/img/placeholder.jpg';
                                    const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : '../Asset/img/placeholder.jpg';
                                    const rating = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                                    const desc = movie.overview || '';
                                    const title = movie.title || movie.name || 'Untitled';
                                    carouselInner.innerHTML += `
                                        <div class="carousel-item ${active}" style="background-image: url('${bg}');">
                                            <div class="carousel-caption">
                                                <div class="carousel-title">${title}</div>
                                                <div class="carousel-rating">★ ${rating}</div>
                                                <div class="carousel-desc">${desc}</div>
                                                <button class="carousel-btn" onclick="window.location.href='../Pages/Movie Detail.html?tmdbId=${movie.id}'">Play</button>
                                            </div>
                                        </div>
                                    `;
                                    indicators.innerHTML += `<button type="button" data-bs-target="#libraryHeroCarousel" data-bs-slide-to="${idx}" class="${active}" aria-label="Slide ${idx+1}"></button>`;
                                });
                            });
                    });
                    </script>
