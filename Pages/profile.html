<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="profile, dashboard, movies">
    <meta name="author" content="Shaun Mahlawe">
    <title>Profile Dashboard</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/main.css">

    <style>
        .profile-shell {
            min-height: 100vh;
            padding: 120px 24px 48px;
            background: radial-gradient(circle at top right, rgba(255, 36, 67, 0.2), transparent 28%), radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 30%), #050505;
        }

        .profile-panel {
            max-width: 880px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(8px);
        }

        .profile-panel h1 {
            margin: 0 0 4px;
            font-size: clamp(2rem, 3.5vw, 2.8rem);
            color: #ffffff;
            font-weight: 800;
        }

        .profile-panel p {
            margin: 0;
            color: rgba(255, 255, 255, 0.76);
        }

        .profile-grid {
            margin-top: 26px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .profile-card {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.32);
        }

        .profile-card .label {
            display: block;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.62);
            margin-bottom: 8px;
        }

        .profile-card .value {
            display: block;
            font-size: 1rem;
            color: #ffffff;
            word-break: break-word;
        }
    </style>
</head>
<body data-auth-mode="protected">
    <header class="hero-header">
        <div class="navbar">
            <a href="../Pages/HomePage.html" class="logo">LOGO</a>
            <nav>
                <ul class="sidebar">
                    <li onclick="hideSidebar()">
                        <a href="#" aria-label="Close menu">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#e3e3e3"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                        </a>
                    </li>
                    <li><a href="../Pages/HomePage.html">Home</a></li>
                    <li><a href="../Pages/Movie Library Page.html">Library</a></li>
                    <li><a href="../Pages/watchlist.html">My List</a></li>
                    <li><a href="../Pages/profile.html">Profile</a></li>
                </ul>

                <ul class="nav-main">
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/HomePage.html">Home</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/Movie Library Page.html">Library</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/watchlist.html">My List</a></li>
                    <li><a class="hide-on-mobile nav-main-link active" href="../Pages/profile.html">Profile</a></li>
                </ul>
            </nav>
        </div>

        <div class="nav-right">
            <ul class="nav-icons hide-on-mobile">
                <li class="profile-menu">
                    <a href="#" class="profile-badge" aria-label="Profile menu">
                        <i class="fa fa-user" aria-hidden="true"></i>
                    </a>
                    <ul class="profile-dropdown" aria-label="Profile menu">
                        <li><a href="../Pages/profile.html"><i class="fa fa-user" aria-hidden="true"></i><span>Profile</span></a></li>
                        <li><a href="#" data-auth-action="logout"><i class="fa fa-sign-out" aria-hidden="true"></i><span>Logout</span></a></li>
                    </ul>
                </li>
            </ul>
            <ul class="mobile-menu-toggle">
                <li onclick="showSidebar()">
                    <a href="#" aria-label="Open menu">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#e3e3e3"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
                    </a>
                </li>
            </ul>
        </div>

        <script>
            function showSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.style.display = 'flex';
            }

            function hideSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.style.display = 'none';
            }
        </script>
    </header>

    <main class="profile-shell">
        <section class="profile-panel">
            <h1>Welcome, <span data-user-name id="profileGreetingName">User</span></h1>
            <p>Your account and activity details are synced with Firebase.</p>

            <div class="profile-grid">
                <article class="profile-card">
                    <span class="label">Display Name</span>
                    <span class="value" id="profileDisplayName">-</span>
                </article>
                <article class="profile-card">
                    <span class="label">Email</span>
                    <span class="value" id="profileEmail">-</span>
                </article>
                <article class="profile-card">
                    <span class="label">Role</span>
                    <span class="value" id="profileRole">user</span>
                </article>
                <article class="profile-card">
                    <span class="label">Last Seen</span>
                    <span class="value" id="profileLastSeen">-</span>
                </article>
            </div>
        </section>
    </main>

    <script src="../js/navbar.js"></script>
    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/profile.js"></script>
</body>
</html>
