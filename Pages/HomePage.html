<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!--Bootstrap, Javascript, Google Fonts, CSS-->

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/SM.main.css?v=nav-refresh-8">
    

</head>
<body>
    <header class="hero-header">
        <div class="navbar">
            <a href="../Pages/HomePage.html" class="logo">LOGO</a>
            <nav>
                <ul class="sidebar">
                    <li onclick="hideSidebar()">
                        <a href="#" aria-label="Close menu">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#e3e3e3"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                        </a>
                    </li>
                    <li><a href="../Pages/HomePage.html">Home</a></li>
                    <li><a href="../Pages/Movie Library Page.html">Library</a></li>
                    <li><a href="../Pages/Movie Page.html">Movies</a></li>
                    <li><a href="../Pages/watchlist.html">My List</a></li>
                    <li><a href="../index.html">Login</a></li>
                </ul>

                <ul class="nav-main">
                    <li><a class="hide-on-mobile nav-main-link active" href="../Pages/HomePage.html">Home</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/Movie Library Page.html">Library</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/Movie Page.html">Movies</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../Pages/watchlist.html">My List</a></li>
                    <li><a class="hide-on-mobile nav-main-link" href="../index.html">Login</a></li>
                </ul>
            </nav>
        </div>

        <div class="nav-right">
            <ul class="nav-icons hide-on-mobile">
                <li><a href="#" aria-label="Search"><i class="fa fa-search" aria-hidden="true"></i></a></li>
                <li><a href="#" aria-label="Notifications"><i class="fa fa-bell" aria-hidden="true"></i></a></li>
                <li><a href="#" class="profile-badge" aria-label="Profile">A</a></li>
            </ul>
            <ul class="mobile-menu-toggle">
                <li onclick="showSidebar()">
                    <a href="#" aria-label="Open menu">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#e3e3e3"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
                    </a>

            </ul>
        </div>

        <script>
            function showSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.style.display = 'flex';
            }

            function hideSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.style.display = 'none';
            }
        </script>
    </header>

    <div id="heroCarousel" class="carousel carousel-fade carousel-slide" data-bs-ride="carousel">
        <div class="carousel-indicators custom-indicators"></div>
        <div class="carousel-inner"></div>
        <button class="hero-carousel-control prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev" aria-label="Previous trailer">
            <i class="fa fa-angle-left" aria-hidden="true"></i>
        </button>
        <button class="hero-carousel-control next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next" aria-label="Next trailer">
            <i class="fa fa-angle-right" aria-hidden="true"></i>
        </button>
    </div>

    <main class="home-shell">
        <section class="content-block trends-block">
            <div class="section-topline">
                <h2 class="trends-title"><i class="fa fa-line-chart" aria-hidden="true"></i> Trends Now</h2>
                <div class="topline-links">
                    <button class="topline-link active" type="button"><i class="fa fa-fire" aria-hidden="true"></i> Popular</button>
                    <button class="topline-link" type="button"><i class="fa fa-star" aria-hidden="true"></i> Premieres</button>
                    <button class="topline-link" type="button"><i class="fa fa-plus" aria-hidden="true"></i> Recently Added</button>
                </div>
            </div>

            <div class="chip-row">
                <button class="chip" type="button" data-genre="Action">Action</button>
                <button class="chip" type="button" data-genre="Adventure">Adventure</button>
                <button class="chip" type="button" data-genre="Animation">Animation</button>
                <button class="chip" type="button" data-genre="Biography">Biography</button>
                <button class="chip" type="button" data-genre="Crime">Crime</button>
                <button class="chip" type="button" data-genre="Comedy">Comedy</button>
                <button class="chip" type="button" data-genre="Documentary">Documentary</button>
                <button class="chip" type="button" data-genre="Drama">Drama</button>
            </div>

            <div class="trend-carousel-shell">
                <button id="trendPrev" class="trend-nav-btn" type="button" aria-label="Scroll trends left">
                    <i class="fa fa-angle-left" aria-hidden="true"></i>
                </button>
                <div id="trendCards" class="poster-row trend-poster-row" aria-live="polite"></div>
                <button id="trendNext" class="trend-nav-btn" type="button" aria-label="Scroll trends right">
                    <i class="fa fa-angle-right" aria-hidden="true"></i>
                </button>
            </div>
        </section>

        <section class="content-block movies-block">
            <div class="section-topline movies-head">
                <h2 class="movies-title" id="moviesSectionTitle"><i class="fa fa-film" aria-hidden="true"></i> Movies</h2>
                <div class="topline-links">
                    <button class="topline-link active" type="button" data-tab="movies">Movies</button>
                    <button class="topline-link" type="button" data-tab="series">Series</button>
                    <button class="topline-link" type="button" data-tab="originals">Original Series</button>
                </div>
            </div>

            <div class="chip-row">
                <button class="chip" type="button" data-genre="Action">Action</button>
                <button class="chip" type="button" data-genre="Adventure">Adventure</button>
                <button class="chip" type="button" data-genre="Animation">Animation</button>
                <button class="chip" type="button" data-genre="Biography">Biography</button>
                <button class="chip" type="button" data-genre="Crime">Crime</button>
                <button class="chip" type="button" data-genre="Comedy">Comedy</button>
                <button class="chip" type="button" data-genre="Documentary">Documentary</button>
                <button class="chip" type="button" data-genre="Drama">Drama</button>
            </div>

            <div class="movies-toolbar">
                <div class="sort-group">
                    <span>Sort by:</span>
                    <button class="mini-pill active" type="button" data-sort="latest">Latest</button>
                    <button class="mini-pill" type="button" data-sort="year">Year</button>
                    <button class="mini-pill" type="button" data-sort="az">A-Z</button>
                </div>
                <div class="rating-group">
                    <span class="rating-star">★</span>
                    <input type="range" min="0" max="10" step="0.1" value="5" aria-label="rating filter" id="movieRatingFilter">
                    <span id="movieRatingValue">5.0</span>
                </div>
            </div>

            <section class="movie-grid" id="movie-card">
                <div id="movieCards" class="movie-grid" aria-live="polite"></div>
            </section>
        </section>

        <section class="featured-player" id="featuredPlayer">
            <div class="featured-overlay">
                <p class="featured-status">Watching</p>
                <h3 id="featuredTitle">Featured Movie</h3>
                <div class="player-controls">
                    <div class="control-left">
                        <button type="button">❚❚</button>
                        <span id="featuredRuntime">00:00</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill"></div>
                    </div>
                    <div class="control-right">
                        <button type="button">🔈</button>
                        <button type="button">⤢</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-block bottom-row-block">
            <div id="recommendedCards" class="poster-row" aria-live="polite"></div>
        </section>
    </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="../js/jquery.js"></script>
  <script src="../js/carousel.js"></script>
  <script src="../js/navbar.js"></script>
    <script src="../js/api-config.js?v=1"></script>
    <script src="../js/imdb-top250.js?v=api-fallback-14"></script>
  <script src="../js/main.js"></script>

</body>
</html>
